apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-lecture-project
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Terikyy/devops-lecture-project
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-lecture-project
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true

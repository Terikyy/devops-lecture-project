apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Terikyy/devops-lecture-project
    targetRevision: HEAD
    path: kubernetes/product-service
  destination:
    server: https://kubernetes.default.svc
    namespace: product-service
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true

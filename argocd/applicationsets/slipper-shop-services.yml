apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: slipper-shop-services
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/Terikyy/devops-lecture-project
        revision: HEAD
        directories:
          - path: kubernetes/slipper-shop-services/*
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Terikyy/devops-lecture-project
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

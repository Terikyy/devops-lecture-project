apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: monitoring
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/Terikyy/devops-lecture-project
        revision: HEAD
        directories:
          - path: kubernetes/monitoring/*
  template:
    metadata:
      name: '{{path.basename}}-monitoring'
    spec:
      project: default
      source:
        repoURL: https://github.com/Terikyy/devops-lecture-project
        targetRevision: HEAD
        path: '{{path}}'
        directory:
          include: app.yml
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

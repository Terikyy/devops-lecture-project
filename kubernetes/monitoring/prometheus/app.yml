apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lgtm-prometheus
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 28.13.0
      helm:
        valueFiles:
          - $values/kubernetes/monitoring/prometheus/values.yml
    - repoURL: https://github.com/Terikyy/devops-lecture-project
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

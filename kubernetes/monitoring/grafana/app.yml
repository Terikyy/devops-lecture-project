apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lgtm-grafana
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: grafana
      targetRevision: 11.3.2
      helm:
        valueFiles:
          - $values/kubernetes/monitoring/grafana/values.yml
    - repoURL: https://github.com/Terikyy/devops-lecture-project
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

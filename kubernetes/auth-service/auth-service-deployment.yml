apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 4
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-api
        image: oleschmid/slipper-shop-auth-service:latest
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"